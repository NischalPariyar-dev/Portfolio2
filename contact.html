<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Nischal Pariyar</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #161b22;
            --accent-color: #00ff41;
            --text-color: #ffffff;
            --secondary-text: #8b949e;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
        }

        nav {
            display: flex;
            justify-content: center;
            padding: 20px;
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            margin: 0 15px;
        }

        .contact-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid #30363d;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
        }

        .contact-info {
            flex: 1;
            min-width: 250px;
        }

        .contact-form {
            flex: 1.5;
            min-width: 300px;
        }

        h2 { color: var(--accent-color); margin-top: 0; }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 8px;
            box-sizing: border-box; /* Crucial for width */
        }

        input:focus, textarea:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        button {
            background: var(--accent-color);
            color: black;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        .social-link {
            display: block;
            color: var(--accent-color);
            text-decoration: none;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">About</a>
        <a href="skills.html">Skills</a>
        <a href="hobbies.html">Hobbies</a>
        <a href="contact.html" style="color: var(--accent-color);">Contact</a>
    </nav>

    <div class="contact-container">
        <div class="contact-info">
            <h2>Let's Connect</h2>
            <p>I'm currently based in Mid Baneshwor, Kathmandu.</p>
            <p>Feel free to reach out for collaborations or just to say hi!</p>
            
            <a href="https://github.com/nischalpariyar-dev" class="social-link">GitHub Profile</a>
            <a href="#" class="social-link">Discord Community</a>
        </div>

        <div class="contact-form">
            <form action="#">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea rows="5" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>

</body>
</html>
